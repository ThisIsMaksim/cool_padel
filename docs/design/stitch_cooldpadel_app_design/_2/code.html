<style>
        body {
            background-color: #f8f9fa;
            color: #191c1d;
            font-family: 'Hanken Grotesk', sans-serif;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .kinetic-bg {
            background: linear-gradient(135deg, #f8f9fa 0%, #edeeef 100%);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .electric-glow:focus {
            box-shadow: 0 0 15px rgba(195, 244, 0, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<div class="kinetic-bg"></div>
<!-- Top Navigation Anchor (Shared Component logic: Transactional page usually suppresses shell, but we keep branding) -->
<header class="flex justify-center items-center px-margin-mobile py-8 w-full z-50">
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary tracking-tighter">CoolPadel</h1>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile pb-xl">
<div class="w-full max-w-md">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-md md:p-lg shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant relative overflow-hidden">
<!-- Athletic Accent Line -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary-fixed"></div>
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-background mb-base">С возвращением!</h2>
<p class="font-body-md text-body-md text-secondary">Войдите в свой аккаунт, чтобы управлять играми и турнирами.</p>
</div>
<form action="#" class="space-y-md" method="POST">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant block px-1" for="email">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-2 border-outline-variant rounded-lg px-md py-3 font-body-md text-on-surface focus:outline-none focus:border-primary-fixed electric-glow transition-all duration-200" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Пароль</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Забыли пароль?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-2 border-outline-variant rounded-lg px-md py-3 font-body-md text-on-surface focus:outline-none focus:border-primary-fixed electric-glow transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-fixed text-on-primary-fixed font-headline-md text-headline-md-mobile py-4 rounded-xl shadow-lg hover:bg-inverse-primary active:scale-[0.98] transition-all duration-200 flex justify-center items-center gap-base mt-lg" type="submit">
                        Войти
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm uppercase tracking-widest">
<span class="bg-surface-container-lowest px-md text-secondary">Или через соцсети</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-base border-2 border-outline-variant rounded-xl py-3 px-md font-label-lg text-on-surface hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-secondary" data-icon="google">google</span>
                        Google
                    </button>
<button class="flex items-center justify-center gap-base border-2 border-outline-variant rounded-xl py-3 px-md font-label-lg text-on-surface hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-secondary" data-icon="apple">ios</span>
                        Apple
                    </button>
</div>
</div>
<!-- Bottom Prompt -->
<p class="mt-md text-center font-body-md text-body-md text-secondary">
                Нет аккаунта? 
                <a class="text-primary font-bold hover:underline" href="#">Зарегистрироваться</a>
</p>
</div>
</main>
<!-- Decorative Athletic Imagery (Bento style hint) -->
<div class="hidden lg:block fixed right-10 bottom-10 w-64 h-64 opacity-20 pointer-events-none">
<img alt="Athletic Padel Texture" class="w-full h-full object-cover rounded-full rotate-12 grayscale" data-alt="A dynamic close-up photograph of a professional padel racket hitting a neon yellow ball with high velocity. The lighting is dramatic and cinematic, emphasizing the athletic motion and the carbon fiber texture of the racket. The color palette is dominated by deep greys and blacks with a striking electric lime green glow from the ball, reflecting a high-octane performance sports aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKLSCJ47_Zi3lntfg7WiFN9pgdCvkkE6Xq0K6NqtvOUqZmgMCSZCbKyCJZubH2o4_IchAeVKPHK7jaTRWntPXv54EdrlGmqvEqOsaPp_tG5Y2odnFDVUAnhZ6gMAsa27tqUiX79ZDunIsesD3_SwyNTiZzhNETvjfJYfknEuCoIRXW77KdiPGVp16Sq3XHG6a2ypP4PtZiE_o4xu6jWFgk507qJYwGQ2oWHia-9YOR-2A7xnPqZUrUNdlIcGn6DHy4vb8cl-ZziLQ"/>
</div>
<script>
        // Simple micro-interaction for input focus
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
