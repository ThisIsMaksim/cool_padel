<!DOCTYPE html>

<html class="light" lang="ru"><head>

                    "on-tertiary-fixed-variant": "#3a4666",
                    "inverse-on-surface": "#f0f1f2",
                    "tertiary-fixed": "#dae2ff",
                    "surface-variant": "#e1e3e4",

                    "error": "#ba1a1a",

                    "on-surface": "#191c1d",
                    "tertiary-container": "#e8ecff",

          },
        },
      }

<style>
        body { background-color: #f8f9fa; }
        .kinetic-bg {
            background: linear-gradient(135deg, #f8f9fa 0%, #e1e3e4 100%);
            position: relative;
            overflow: hidden;
        }
        .court-line {
            position: absolute;
            background: rgba(80, 102, 0, 0.1);
            z-index: 0;
        }
        .glow-effect {
            box-shadow: 0 0 20px rgba(195, 244, 0, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-md text-on-background">
<!-- Top Navigation suppressed for transactional flow (Registration) -->
<main class="flex-grow kinetic-bg flex items-center justify-center py-xl px-margin-mobile relative">
<!-- Padel Court Aesthetic Background Elements -->
<div class="court-line w-[2px] h-full left-1/4 top-0 rotate-12"></div>
<div class="court-line w-[2px] h-full right-1/4 top-0 -rotate-12"></div>
<div class="court-line h-[2px] w-full top-1/3 left-0"></div>
<!-- Registration Card -->
<div class="relative z-10 w-full max-w-md bg-surface-container-lowest rounded-xl p-md md:p-lg shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-outline-variant/30 backdrop-blur-sm bg-opacity-95">
<!-- Logo/Identity Area -->
<div class="flex flex-col items-center mb-lg">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-sm glow-effect">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="sports_tennis">sports_tennis</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">CoolPadel</h1>
<p class="font-body-md text-secondary mt-1">Присоединяйтесь к сообществу</p>
</div>
<!-- Form -->
<form class="space-y-md" id="registrationForm">
<!-- Name Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="name">Имя и фамилия</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border-2 border-outline-variant focus:border-primary focus:ring-0 outline-none transition-all duration-200 bg-surface" id="name" placeholder="Александр Петров" required="" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-secondary opacity-50" data-icon="person">person</span>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="email">Электронная почта</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border-2 border-outline-variant focus:border-primary focus:ring-0 outline-none transition-all duration-200 bg-surface" id="email" placeholder="example@mail.ru" required="" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-secondary opacity-50" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="password">Пароль</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border-2 border-outline-variant focus:border-primary focus:ring-0 outline-none transition-all duration-200 bg-surface" id="password" placeholder="••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-secondary opacity-50 cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Skill Level (Asymmetric Selector) -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1">Ваш уровень игры</label>
<div class="grid grid-cols-2 gap-sm">
<button class="level-btn flex flex-col items-start p-sm border-2 border-outline-variant rounded-xl hover:border-primary transition-all group bg-surface" onclick="setLevel('beginner')" type="button">
<span class="font-label-lg text-label-lg text-primary">Начинающий</span>
<span class="text-[10px] text-secondary opacity-70">Только начинаю путь</span>
</button>
<button class="level-btn flex flex-col items-start p-sm border-2 border-outline-variant rounded-xl hover:border-primary transition-all group bg-surface" onclick="setLevel('intermediate')" type="button">
<span class="font-label-lg text-label-lg text-primary">Средний</span>
<span class="text-[10px] text-secondary opacity-70">Играю регулярно</span>
</button>
<button class="level-btn flex flex-col items-start p-sm border-2 border-outline-variant rounded-xl hover:border-primary transition-all group bg-surface" onclick="setLevel('advanced')" type="button">
<span class="font-label-lg text-label-lg text-primary">Продвинутый</span>
<span class="text-[10px] text-secondary opacity-70">Участвую в турнирах</span>
</button>
<button class="level-btn flex flex-col items-start p-sm border-2 border-outline-variant rounded-xl hover:border-primary transition-all group bg-surface" onclick="setLevel('pro')" type="button">
<span class="font-label-lg text-label-lg text-primary">Профи</span>
<span class="text-[10px] text-secondary opacity-70">Профессиональный уровень</span>
</button>
</div>
<input id="skillLevel" name="skillLevel" required="" type="hidden"/>
</div>
<!-- Preferred Club (Dropdown) -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="club">Предпочитаемый клуб</label>
<select class="w-full px-4 py-3 rounded-lg border-2 border-outline-variant focus:border-primary focus:ring-0 outline-none transition-all duration-200 bg-surface appearance-none" id="club">
<option disabled="" selected="" value="">Выберите клуб</option>
<option value="luzhniki">Лужники Падель</option>
<option value="skolkovo">Сколково Парк</option>
<option value="city">Москва Сити Корт</option>
<option value="arena">Падель Арена</option>
</select>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-xl shadow-lg hover:bg-primary-fixed hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 mt-md glow-effect" type="submit">
                    Стать частью CoolPadel
                </button>
</form>
<!-- Secondary Action -->
<div class="mt-md text-center">
<p class="font-label-lg text-secondary">
                    Уже есть аккаунт? 
                    <a class="text-primary font-bold hover:underline" href="#">Войти</a>
</p>
</div>
</div>
<!-- Decorative Action Shot (Asymmetric Floating Element) -->
<div class="hidden lg:block absolute right-12 bottom-12 w-80 h-96 rounded-3xl overflow-hidden shadow-2xl border-4 border-white rotate-3">
<img alt="Padel action" class="w-full h-full object-cover" data-alt="A dynamic high-action shot of a padel player hitting a powerful overhead smash on a modern court. The lighting is crisp and bright, highlighting the Electric Lime colored racket against a sleek grey and glass court background. The overall aesthetic is high-performance and athletic, using the brand's vibrant green and deep navy color palette to convey energy and professionalism." src="https://lh3.googleusercontent.com/aida-public/AB6AXuApDtqDvp-Qcfn7f_srGMgiX4GjH1S8NO0JVNOK0GCm4hAxATWhTxS18LE4RaWsvZtuG_OgsZy6JIWtWrRpN-I5JcZBGtfy4zwPnJHQFLr-C5YdauJE059Zb-lkOcP5w5p8UBWuzyuszBIhYAZefk3aM9PUJSWNOyy6kiD3FW7C9sxiZrN5kKJCWkAo4lVqDUO5pI34rINmy2iy0rQWCueIMBhC9H_hAOaCbf1M8n9SYGuNyCqg6cqmdBoQxNJvU8yEbIycCsE9Sm8"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-md">
<p class="text-white font-headline-md leading-tight">Играй. Побеждай. Вдохновляй.</p>
</div>
</div>
</main>
<script>
        function setLevel(level) {
            // Reset all buttons
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('bg-primary-container', 'border-primary');
                btn.classList.add('bg-surface', 'border-outline-variant');
            });
            
            // Highlight selected
            const activeBtn = event.currentTarget;
            activeBtn.classList.add('bg-primary-container', 'border-primary');
            activeBtn.classList.remove('bg-surface', 'border-outline-variant');
            
            // Set hidden input
            document.getElementById('skillLevel').value = level;
            
            // Micro-interaction: tiny pop
            activeBtn.style.transform = 'scale(1.05)';
            setTimeout(() => {
                activeBtn.style.transform = 'scale(1)';
            }, 100);
        }

        // Form Submission Logic
        document.getElementById('registrationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="autorenew">autorenew</span> Регистрация...';
            
            // Simulate success
            setTimeout(() => {
                btn.classList.replace('bg-primary-container', 'bg-primary');
                btn.classList.replace('text-on-primary-container', 'text-on-primary');
                btn.innerHTML = 'Добро пожаловать!';
            }, 1500);
        });

        // Floating particle effect for "Kinetic" feel
        const main = document.querySelector('main');
        for (let i = 0; i < 15; i++) {
            const dot = document.createElement('div');
            dot.className = 'absolute rounded-full bg-primary opacity-10 pointer-events-none';
            const size = Math.random() * 8 + 4;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${Math.random() * 100}%`;
            dot.style.top = `${Math.random() * 100}%`;
            main.appendChild(dot);
            
            // Slow float animation
            const duration = Math.random() * 20 + 10;
            dot.animate([
                { transform: 'translate(0, 0)' },
                { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px)` }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                direction: 'alternate',
                easing: 'ease-in-out'
            });
        }
    </script>
</body></html>
